name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Versão
      - name: Obter versão da tag
        run: |
          git fetch --tags
          VERSION=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Verifica se o repo existe no Docker Hub e cria se necessario
      - name: Verificar/criar repositorio no Docker Hub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
          DH_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
          DH_REPO: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          # Login na API REST do Hub para obter JWT (registry login != API login)
          HUB_TOKEN=$(curl -fsSL -H "Content-Type: application/json" \
            -X POST -d "{\"username\":\"$DH_USER\",\"password\":\"$DH_PASS\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          if [ -z "$HUB_TOKEN" ] || [ "$HUB_TOKEN" = "null" ]; then
            echo "Falha no login da API Docker Hub"
            exit 1
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: JWT $HUB_TOKEN" \
            "https://hub.docker.com/v2/repositories/$DH_NAMESPACE/$DH_REPO/")

          if [ "$STATUS" = "200" ]; then
            echo "[OK] Repositorio $DH_NAMESPACE/$DH_REPO ja existe"
          elif [ "$STATUS" = "404" ]; then
            echo "[NEW] Criando repositorio publico $DH_NAMESPACE/$DH_REPO"
            curl -fsSL -H "Authorization: JWT $HUB_TOKEN" \
              -H "Content-Type: application/json" \
              -X POST \
              -d "{\"namespace\":\"$DH_NAMESPACE\",\"name\":\"$DH_REPO\",\"is_private\":false,\"description\":\"Sangue Solidario - $DH_REPO\"}" \
              https://hub.docker.com/v2/repositories/
            echo ""
            echo "[OK] Repositorio criado"
          else
            echo "Status inesperado da API: HTTP $STATUS"
            exit 1
          fi

      # Build e push
      - name: Build e push
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ secrets.HEROKU_APP_NAME }}:latest \
            -t ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ secrets.HEROKU_APP_NAME }}:${{ env.VERSION }} .

          docker push ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ secrets.HEROKU_APP_NAME }}:latest
          docker push ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ secrets.HEROKU_APP_NAME }}:${{ env.VERSION }}

      # PULL da imagem pronta (do Docker Hub)
      - name: Pull da imagem
        run: |
          docker pull ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ secrets.HEROKU_APP_NAME }}:${{ env.VERSION }}

      # Sonar Qube Scanner
      - name: SonarQube
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
            -Dsonar.sources=src

      # Login no Heroku Registry
      - name: Login Heroku Container Registry
        run: |
          echo ${{ secrets.HEROKU_API_KEY }} | docker login \
            --username=_ \
            --password-stdin registry.heroku.com

      # TAG para Heroku
      - name: Tag imagem para Heroku
        run: |
          docker tag \
            ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ secrets.HEROKU_APP_NAME }}:${{ env.VERSION }} \
            registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web

      # PUSH para Heroku
      - name: Push para Heroku
        run: |
          docker push registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web

      # Release
      - name: Release no Heroku
        run: |
          curl https://cli-assets.heroku.com/install.sh | sh
          heroku container:release web --app ${{ secrets.HEROKU_APP_NAME }}
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}